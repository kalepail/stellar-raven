# Visit https://soloterm.com to learn more
name: stellar-raven-codemode
icon: null
processes:
  # Demo site + MCP endpoint at http://localhost:8787 (--host localhost is
  # required: custom-domain routes otherwise make wrangler dev rewrite the
  # request host to production and 401 the local auth bypass). Landing page at
  # /, OAuth consent at /authorize, MCP at /mcp. wrangler dev hot-reloads src
  # itself; it does NOT reload .dev.vars — restart this process after editing it.
  dev:
    command: npm run dev
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  # Deploy to production (raven.stellar.buzz / agents.stellar.buzz). One-shot.
  deploy:
    command: npm run deploy
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  # Regenerate env.d.ts binding types from wrangler.jsonc. One-shot.
  typegen:
    command: npm run typegen
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
  # Type-check the project (tsc --noEmit). One-shot.
  typecheck:
    command: npm run typecheck
    working_dir: null
    auto_start: false
    auto_restart: false
    restart_when_changed: []
    env: {}
