# GitHub secret scanning — path exclusions.
#
# STATUS: this file activates the moment the repo becomes PUBLIC (GitHub secret
# scanning + push protection are free on public repos). While the repo is
# private it is dormant — the active guards today are the pre-commit hook
# (scripts/git-hooks/pre-commit) and the CI `secrets` job, both driven by
# scripts/scan-secrets.mjs.
#
# paths-ignore suppresses alerts (and push protection) for paths that contain
# documented public example tokens / opaque binary blobs, not real credentials.
# Keep this list tight — every entry is a place GitHub will stop looking.
paths-ignore:
  # Vendored golden-QA fixtures: base64-encoded blobs and example/redacted tokens
  # from retired sibling repos (see eval/corpus/PROVENANCE.md). Not live secrets.
  - "eval/corpus/**"
