name: CI

on:
  push:
    branches: [main]
  pull_request:

# Explicit least-privilege token: this workflow only reads the repo. The repo
# default is currently read-only too, but that's a mutable setting — pin it
# here so fork PRs on the public repo can never inherit anything broader.
permissions:
  contents: read

jobs:
  # Server-side backstop for the pre-commit hook (scripts/scan-secrets.mjs).
  # Runs on every push/PR regardless of GitHub plan — unlike GitHub push
  # protection, which needs paid Secret Protection on private repos. Once this
  # repo is public, GitHub's native secret scanning (+ .github/secret_scanning.yml)
  # layers on top of this. Zero-dep: no npm install, full history checkout so it
  # can scan what actually landed.
  secrets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          node-version: 24
      - name: scan tracked files for secrets
        run: node scripts/scan-secrets.mjs --tree

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-node@v7
        with:
          # Node 24: build-catalog.mjs relies on native TS type-stripping, stable
          # since Node 23.6 (see scripts/build-catalog.mjs). Do not drop below 24.
          node-version: 24
          cache: npm
      - run: npm ci
      # wrangler types derives the Env interface from wrangler.jsonc bindings
      # PLUS .dev.vars names; without the stub, Env loses the secret members and
      # tsc fails. Names only — never real values.
      - name: stub .dev.vars for type generation
        run: printf 'LUMENLOOP_API_KEY=x\nALGOLIA_APPLICATION_ID_DOCS=x\nALGOLIA_API_KEY_DOCS=x\nALGOLIA_APPLICATION_ID_SITE=x\nALGOLIA_API_KEY_SITE=x\nWORKOS_CLIENT_ID=x\nWORKOS_API_KEY=x\nMCP_SERVER_SECRET=x\nDEV_ALLOW_UNAUTHENTICATED=x\n' > .dev.vars
      - run: npm run typegen
      - run: npm run typecheck
      # Bundle/deploy path: dry-run the Worker build so a broken bundle, a missing/
      # renamed binding, a bad import, or a size regression fails CI here instead of
      # only surfacing at the manual `npm run deploy`. Offline — `--dry-run` exits
      # before any upload, so no secrets or network are needed.
      - run: npm run build
      - run: npm test
      # workerd smoke lane (test/smoke/, Solo todo 833): the assembled router
      # + real Dynamic Worker executor boundary via vitest-pool-workers.
      # Offline enforced (miniflare outboundService wall) — auth/keys are
      # test-only fakes from its config, so no repo secrets are needed.
      - run: npm run test:smoke
      # Deterministic eval gates (eval/EVALS.md): the grader's own fixture suite
      # (eval/lib/*.mjs is not covered by vitest) + the routing gate — legacy 338
      # within ±1% of eval/gates.json, skills lane top-1 at/above its floor.
      # Both offline: searchCatalog over the committed manifest, no live services.
      # (`eval:qa:selftest` is deliberately NOT here: the judge self-test spawns
      # the live `claude` CLI to grade fixtures, so it is a run-evals manual gate,
      # not an offline CI step — see .agents/skills/run-evals/SKILL.md.)
      - run: npm run eval:selftest
      - run: npm run eval:qa:lint -- --stale
      - name: lint frozen canonical live contract
        run: |
          BASE="$(node -e 'const event = process.env.GITHUB_EVENT_PATH ? JSON.parse(require("node:fs").readFileSync(process.env.GITHUB_EVENT_PATH, "utf8")) : {}; process.stdout.write(event.pull_request?.base?.sha ?? event.before ?? "HEAD^")')"
          node eval/qa/lint-corpus.mjs --live-contract eval/qa/corpus/live/live-cases.json --since "$(git merge-base HEAD "$BASE")"
      - run: npm run improvements:lint
      - run: npm run eval:routing -- --gate
      # Generated artifacts must match their sources exactly (they are rebuilt,
      # never hand-edited). Every build here is offline: catalog/spec/skills read
      # inventory/, specs/stellar-docs.json, ecosystem-skills/, and the globe
      # generator's committed drawing inputs; the eval
      # compiles read eval/corpus/ (committed in-repo); op-classes reads the
      # freshly-rebuilt catalog/manifest.json (so it runs after build-catalog).
      - name: generated artifacts in sync
        run: |
          node scripts/build-catalog.mjs
          npm run micro-map:build
          npm run spec:build
          npm run skills:bundle
          npm run site:globes
          node scripts/check-mirrors.mjs
          node eval/compile-routing.mjs
          node eval/qa/compile-qa.mjs
          node eval/plan/build-op-classes.mjs
          if ! git diff --exit-code --stat -- catalog specs src/mcp/micro-map.ts src/skills/bundle.json src/demo/globe.ts src/consent-globe.ts eval/routing-cases.json eval/qa/cases.json eval/qa/sample.json eval/plan/op-classes.json; then
            echo "::error::generated artifacts out of sync — run the build scripts locally and commit the result"
            exit 1
          fi
